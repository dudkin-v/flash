<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flash Autofill</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 340px;
                background: #0a0a0a;
                color: #ffffff;
                font-family: system-ui, 'Segoe UI', sans-serif;
                font-size: 12px;
            }

            .header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 12px 16px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                background: #111111;
            }
            .header img {
                width: 18px;
                height: 18px;
            }
            .header h1 {
                font-size: 13px;
                font-weight: 600;
                color: #fff;
            }

            .body {
                padding: 12px 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            label {
                font-size: 11px;
                color: #71717a;
                font-weight: 500;
                display: block;
                margin-bottom: 4px;
            }

            textarea {
                width: 100%;
                height: 72px;
                background: #111111;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                padding: 8px 10px;
                color: #ffffff;
                font-size: 11px;
                font-family: monospace;
                resize: none;
                outline: none;
                transition: border-color 0.15s;
            }
            textarea:focus {
                border-color: rgba(255, 255, 255, 0.3);
            }
            textarea::placeholder {
                color: #3f3f46;
            }

            .fields {
                display: none;
                flex-direction: column;
                gap: 2px;
                background: #111111;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 8px;
                overflow: hidden;
            }
            .fields.visible {
                display: flex;
            }

            .field-row {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 10px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                cursor: pointer;
                transition: background 0.1s;
            }
            .field-row:last-child {
                border-bottom: none;
            }
            .field-row:hover {
                background: rgba(255, 255, 255, 0.06);
            }

            .field-key {
                width: 70px;
                flex-shrink: 0;
                color: #a1a1aa;
                font-size: 10px;
            }
            .field-val {
                flex: 1;
                color: #ffffff;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .copy-hint {
                font-size: 10px;
                font-weight: 500;
                color: #ffffff;
                background: #3f3f46;
                border-radius: 4px;
                padding: 2px 7px;
                flex-shrink: 0;
                transition: background 0.1s;
            }
            .field-row:hover .copy-hint {
                background: #52525b;
            }

            .error {
                display: none;
                background: rgba(127, 29, 29, 0.3);
                border: 1px solid rgba(239, 68, 68, 0.3);
                border-radius: 8px;
                padding: 8px 10px;
                color: #fca5a5;
                font-size: 11px;
            }
            .error.visible {
                display: block;
            }

            .result {
                display: none;
                background: rgba(21, 128, 61, 0.15);
                border: 1px solid rgba(74, 222, 128, 0.25);
                border-radius: 8px;
                padding: 8px 10px;
                color: #6ee7a0;
                font-size: 11px;
            }
            .result.visible {
                display: block;
            }

            button {
                flex: 1;
                padding: 7px 12px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                border: none;
                transition: all 0.15s;
            }
            .btn-primary {
                background: #ffffff;
                color: #000000;
            }
            .btn-primary:hover {
                background: #e4e4e7;
            }
            .btn-primary:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .btn-ghost {
                background: transparent;
                color: #a1a1aa;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.05);
                color: #ffffff;
            }

            .copied-toast {
                position: fixed;
                bottom: 12px;
                left: 50%;
                transform: translateX(-50%);
                background: #1a1a1a;
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 6px;
                padding: 5px 12px;
                font-size: 11px;
                color: #a1a1aa;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            .copied-toast.show {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Flash Autofill</h1>
        </div>

        <div class="body">
            <div>
                <label>Вставте JSON профілю</label>
                <textarea
                    id="json-input"
                    placeholder='{"firstName":"MARCO","lastName":"RODRIGUEZ",...}'
                ></textarea>
            </div>

            <div class="error" id="error"></div>

            <div class="fields" id="fields"></div>

            <div class="result" id="result"></div>

            <button class="btn-ghost" id="btn-clear">Очистити</button>
        </div>

        <div class="copied-toast" id="toast">Скопійовано</div>

        <script src="constants.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
